<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>理化單元抽籤模擬器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #a8d8ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #3a3a3a;
    position: relative;
    overflow-x: hidden;
  }

  /* 天空漸層 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #c9e8f5 0%, #a8d8ea 45%, #7ec8a0 80%, #5aaa78 100%);
    z-index: 0;
  }

  /* 雲朵 */
  .cloud {
    position: fixed;
    background: #fff;
    border-radius: 50px;
    opacity: 0.85;
    z-index: 0;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
  }
  .cloud1 { width:100px; height:30px; top:8%; left:5%; animation: drift 18s linear infinite; }
  .cloud1::before { width:50px; height:50px; top:-25px; left:12px; }
  .cloud1::after  { width:35px; height:35px; top:-18px; left:45px; }
  .cloud2 { width:70px; height:22px; top:15%; left:60%; animation: drift 24s linear infinite 4s; }
  .cloud2::before { width:36px; height:36px; top:-18px; left:8px; }
  .cloud2::after  { width:26px; height:26px; top:-13px; left:32px; }
  .cloud3 { width:120px; height:36px; top:5%; left:35%; animation: drift 20s linear infinite 10s; }
  .cloud3::before { width:60px; height:60px; top:-30px; left:14px; }
  .cloud3::after  { width:44px; height:44px; top:-22px; left:55px; }

  @keyframes drift {
    from { transform: translateX(0); }
    to   { transform: translateX(110vw); }
  }

  /* 嚕嚕米 SVG 裝飾 */
  .moomin-deco {
    position: fixed;
    bottom: 0;
    z-index: 1;
  }
  .moomin-left  { left: -10px; }
  .moomin-right { right: -10px; transform: scaleX(-1); }

  /* 草地山丘 */
  .hills {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 0;
  }

  /* 內容層級 */
  h1, .subtitle, .slot-wrapper, .history { position: relative; z-index: 2; }

  h1 {
    font-size: 1.6rem;
    margin-bottom: 6px;
    letter-spacing: 2px;
    color: #2c5f3f;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  }

  .subtitle {
    font-size: 0.85rem;
    color: #4a7c5e;
    margin-bottom: 30px;
  }

  .slot-wrapper {
    background: rgba(255,255,255,0.72);
    border: 2px solid rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 30px 24px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(90,170,120,0.25);
  }

  .slot-display {
    background: rgba(255,255,255,0.55);
    border-radius: 12px;
    padding: 20px 16px;
    margin-bottom: 24px;
    min-height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
    position: relative;
  }

  .badge {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: background 0.3s;
  }

  .badge.s8up   { background: #2ecc71; color: #000; }
  .badge.s8down { background: #3498db; color: #fff; }
  .badge.s9up   { background: #9b59b6; color: #fff; }
  .badge.s9down { background: #e67e22; color: #fff; }
  .badge.rolling { background: #b0cfc0; color: #555; }

  .chapter-name {
    font-size: 0.9rem;
    color: #5a8a6a;
    margin-bottom: 6px;
  }

  .unit-name {
    font-size: 1.5rem;
    font-weight: bold;
    color: #2c5f3f;
    line-height: 1.4;
  }

  .unit-name.rolling {
    color: #8ab09a;
    font-size: 1.1rem;
  }

  .idle-text {
    color: #7aaa8a;
    font-size: 1rem;
  }

  .btn-draw {
    width: 100%;
    padding: 16px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 2px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #5aaa78, #2c8c55);
    color: #fff;
    transition: transform 0.1s, opacity 0.2s;
    box-shadow: 0 6px 20px rgba(44,140,85,0.35);
  }

  .btn-draw:active { transform: scale(0.97); }
  .btn-draw:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-reset {
    margin-top: 12px;
    width: 100%;
    padding: 11px;
    font-size: 0.9rem;
    border: 1px solid rgba(90,170,120,0.35);
    border-radius: 12px;
    cursor: pointer;
    background: transparent;
    color: #5a8a6a;
    transition: background 0.2s;
  }
  .btn-reset:hover { background: rgba(90,170,120,0.12); }

  .history {
    margin-top: 20px;
    width: 100%;
    max-width: 420px;
  }

  .history h2 {
    font-size: 0.85rem;
    color: #4a7c5e;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .history-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
  }

  .history-list li {
    background: rgba(255,255,255,0.55);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    color: #3a5a45;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .history-list li .num {
    color: #8ab09a;
    margin-right: 8px;
    font-size: 0.75rem;
  }

  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 999;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>

function draw() {
  if (rolling) return;
  rolling = true;
  document.getElementById('btnDraw').disabled = true;

  const result = units[Math.floor(Math.random() * units.length)];
  const display = document.getElementById('display');
  let count = 0;
  const totalTicks = 28;
  let interval = 60;

  function tick() {
    const fake = units[Math.floor(Math.random() * units.length)];
    display.innerHTML = `
      <span class="badge rolling">${fake.book}</span>
      <div class="chapter-name" style="color:#666">${fake.chapter}</div>
      <div class="unit-name rolling">${fake.name}</div>
    `;
    count++;
    if (count >= totalTicks) {
      showResult(result);
    } else {
      interval = Math.min(interval * 1.12, 320);
      setTimeout(tick, interval);
    }
  }
  tick();
}

function showResult(unit) {
  const display = document.getElementById('display');
  display.innerHTML = `
    <span class="badge ${unit.badge}">${bookLabel[unit.book]}</span>
    <div class="chapter-name">${unit.chapter}</div>
    <div class="unit-name">${unit.name}</div>
  `;

  history.unshift(unit);
  renderHistory();
  launchConfetti();

  rolling = false;
  document.getElementById('btnDraw').disabled = false;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = history.map((u, i) => `
    <li>
      <span><span class="num">${i + 1}.</span>${u.name}</span>
      <span style="color:#666;font-size:0.75rem">${u.book}</span>
    </li>
  `).join('');
}

function resetHistory() {
  history = [];
  renderHistory();
  document.getElementById('display').innerHTML = '<p class="idle-text">按下按鈕開始抽籤</p>';
}

function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#f5576c','#f093fb','#4facfe','#43e97b','#fa709a','#fee140'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.animationDuration = (1.2 + Math.random() * 1.5) + 's';
    el.style.animationDelay = (Math.random() * 0.5) + 's';
    container.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}
</script>
</body>
</html>
